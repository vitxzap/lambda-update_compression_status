name: Unit test

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checking out code
        uses: actions/checkout@v3

      - name: Setuping node
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: "npm"

      - name: Installing dependencies
        run: npm ci

      - name: Running tests
        run: npm run test
        env:
          DB_HOST: host
          DB_NAME: name
          DB_USER: user
          DB_PASSWORD: password
          COMPRESSION_TABLE: table
